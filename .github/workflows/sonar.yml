name: SonarQube Cloud (Gradle Kotlin)
on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Необходим SonarQube для расчета blame-данных и измененных строк

      - name: Set up Java 21 # Рекомендуемая LTS-версия. Для Java 22 укажите '22'
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin' # Стабильный дистрибутив Eclipse Temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6 # Последняя версия v6 с улучшенным механизмом кэширования

      - name: Make gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ 00dc958b4dff0327c7710cf46f599a633eee920a }}

