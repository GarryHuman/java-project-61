name: Java Project Build and SonarQube Analysis

on:
  push:
    branches: [ main ] # Запускать при пуше в главную ветку
  pull_request:
    types: [ opened, synchronize, reopened ] # Запускать при проверке ПР-ов

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest

    # Явно разрешаем GitHub Actions читать код и отправлять статусы в Pull Request
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обязательно для SonarQube (нужно для вычисления авторов строк)

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21' # Укажите '22', если ваш проект написан на ней
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6 # Быстрое кэширование зависимостей Gradle

      - name: Make gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Генерируется автоматически, не трогаем
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Вы добавили в Settings -> Secrets репозитория
        # Запускаем сборку и передаем корректные ключи SonarCloud напрямую в команду
        run: |
          ./gradlew build sonar \
          -Dsonar.organization="garryhuman" \
          -Dsonar.projectKey="GarryHuman_java-project-61" \
          -Dsonar.host.url="https://sonarcloud.io" \
          --no-daemon --info
